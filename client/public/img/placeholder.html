<!DOCTYPE html>
<html>
<head>
  <title>Image Placeholders</title>
  <style>
    .placeholder {
      width: 100%;
      height: 400px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 24px;
      font-family: Arial, sans-serif;
    }
    .banner1 {
      background: linear-gradient(45deg, #4CAF50, #2196F3);
    }
    .banner2 {
      background: linear-gradient(45deg, #FF9800, #F44336);
    }
    .banner3 {
      background: linear-gradient(45deg, #9C27B0, #E91E63);
    }
    .event1 {
      background: linear-gradient(45deg, #3F51B5, #00BCD4);
      height: 300px;
    }
    .event2 {
      background: linear-gradient(45deg, #009688, #8BC34A);
      height: 300px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 16px;
    }
    .avatar1 {
      background: linear-gradient(45deg, #673AB7, #3F51B5);
    }
    .avatar2 {
      background: linear-gradient(45deg, #E91E63, #9C27B0);
    }
    .avatar3 {
      background: linear-gradient(45deg, #FF5722, #FF9800);
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h1>Banner Placeholders</h1>
  <div class="placeholder banner1">Banner 1</div>
  <div class="placeholder banner2">Banner 2</div>
  <div class="placeholder banner3">Banner 3</div>
  
  <h1>Event Placeholders</h1>
  <div class="placeholder event1">Event 1</div>
  <div class="placeholder event2">Event 2</div>
  

  
  <h1>Avatar Placeholders</h1>
  <div class="container">
    <div class="avatar avatar1">Avatar 1</div>
    <div class="avatar avatar2">Avatar 2</div>
    <div class="avatar avatar3">Avatar 3</div>
  </div>
</body>
</html>
